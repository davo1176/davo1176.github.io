name: Receive Apple Health Data

on:
  repository_dispatch:
    types: [apple-health-update]

permissions:
  contents: write

jobs:
  receive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Process health data payload
        run: |
          python scripts/receive_health_data.py '${{ toJSON(github.event.client_payload) }}'

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/apple_health.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: update Apple Health data"
          for attempt in 1 2 3 4 5; do
            if git pull --rebase --autostash origin main && git push; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push failed (attempt $attempt), retrying..."
            sleep 5
          done
          echo "Failed to push after multiple attempts." >&2
          exit 1
